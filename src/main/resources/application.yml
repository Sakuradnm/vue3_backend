server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/Course
    username: root
    password: 3280461477xjn
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update  # update: 自动更新表结构 | validate: 仅验证 | create: 每次启动重新创建
    show-sql: true      # 显示 SQL 语句
    open-in-view: false  # 关闭 OSIV，避免懒加载问题
    properties:
      hibernate:
        format_sql: true  # 格式化 SQL
        use_new_id_generator_metadata: false
        default_batch_fetch_size: 100  # 批量获取大小

    database-platform: org.hibernate.dialect.MySQLDialect

# MyBatis 配置（如果使用 MyBatis）
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.vue3_backend.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 跨域配置
app:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173

# 日志配置
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.type.descriptor.sql.BasicExtractor: TRACE
    com.example.vue3_backend: DEBUG
